<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.compiled.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            margin-top: 50px;
        }
        .player-container {
            width: 90%;
            max-width: 800px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <h2>My Live Stream</h2>
    <div class="player-container">
        <video id="video" controls autoplay></video>
    </div>

    <script>
        // Aapka video URL (mene double link ko single mein theek kar diya hai)
        const manifestUri = 'https://abkyrm4aaaaaaaamfyfksth3wr44v.ta.bia-cf.live.pv-cdn.net/pdx-nitro/live/clients/dash/enc/mxfalds7lk/out/v1/4898ebe40b8e48d6aba9c028dd60b875/cenc.mpd';

        async function initApp() {
            // Install built-in polyfills to patch browser incompatibilities.
            shaka.polyfill.installAll();

            // Check to see if the browser supports the basic APIs Shaka needs.
            if (shaka.Player.isBrowserSupported()) {
                initPlayer();
            } else {
                console.error('Browser not supported!');
            }
        }

        async function initPlayer() {
            const video = document.getElementById('video');
            const player = new shaka.Player(video);

            // Listen for error events.
            player.addEventListener('error', onErrorEvent);

            // Configure ClearKey DRM yahan set kiya gaya hai
            player.configure({
                drm: {
                    clearKeys: {
                        // 'KID' : 'KEY'
                        'a70339c23a79302093a0845eb7521865': '3dc10e5ebb573d3a4f41e925412ab2c5'
                    }
                }
            });

            try {
                // Load the manifest
                await player.load(manifestUri);
                console.log('Video load ho gaya hai!');
            } catch (e) {
                onError(e);
            }
        }

        function onErrorEvent(event) {
            onError(event.detail);
        }

        function onError(error) {
            console.error('Error code', error.code, 'object', error);
            alert("Video play karne mein error aayi hai. Check console for details.");
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
