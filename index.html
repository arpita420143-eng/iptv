            loader.style.display = 'block';
            if(hls) { hls.destroy(); hls = null; }
            if (Hls.isSupported() && url.includes('.m3u8')) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => { loader.style.display = 'none'; video.play(); });
            } else {
                video.src = url;
                video.addEventListener('loadedmetadata', () => { loader.style.display = 'none'; video.play(); });
            }
        }
