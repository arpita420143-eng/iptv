<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearKey DRM Player</title>
    <!-- Shaka Player Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        /* Premium Dark Theme */
        body {
            background-color: #000000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        .player-container {
            width: 100%;
            max-width: 800px;
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            overflow: hidden;
            background: #111;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <!-- Video Player Element -->
        <video id="video" controls autoplay muted></video>
    </div>

    <script>
        // Aapka MPD URL
        const manifestUri = 'https://a57live-pv-ta-amazon.akamaized.net/iad-nitro/live/clients/dash/enc/ldgnvordfu/out/v1/430b37000b9148379747ac5cfb2ada46/cenc.mpd';

        async function initPlayer() {
            // Install built-in polyfills to patch browser incompatibilities.
            shaka.polyfill.installAll();

            // Check if browser supports Shaka Player
            if (shaka.Player.isBrowserSupported()) {
                const video = document.getElementById('video');
                const player = new shaka.Player(video);

                // Yahan aapka KID aur KEY configure kiya gaya hai
                player.configure({
                    drm: {
                        clearKeys: {
                            // Format: 'KID': 'KEY'
                            '3aa6f9df41c299f659aaee15d0067900': '0434703fb407fb12980f51944271a1f8'
                        }
                    }
                });

                // Error handling
                player.addEventListener('error', function(event) {
                    console.error('Error code', event.detail.code, 'object', event.detail);
                });

                try {
                    // Load the DRM stream
                    await player.load(manifestUri);
                    console.log('Video loaded successfully!');
                } catch (e) {
                    console.error('Error loading video:', e);
                }
            } else {
                console.error('Browser not supported!');
            }
        }

        document.addEventListener('DOMContentLoaded', initPlayer);
    </script>

</body>
</html>
