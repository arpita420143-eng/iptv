<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Live Stream Player</title>
    
    <!-- Shaka Player with built-in UI -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">

    <style>
        /* Dark Theme Setup */
        body {
            background-color: #000;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
        }
        .player-wrapper {
            width: 100%;
            max-width: 850px;
            background: #111;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.8);
            border-radius: 8px;
            overflow: hidden;
        }
        
        /* Clean Top Bar for Controls */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #1a1a1a;
            border-bottom: 2px solid #e50914; /* Netflix Red accent */
        }
        
        /* Blinking LIVE indicator */
        .live-badge {
            background: #e50914;
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            animation: blink 2s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Aspect Ratio Dropdown styling */
        .aspect-controls select {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 6px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            font-size: 14px;
        }

        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9; /* Fixes height perfectly */
        }
        video {
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        /* Screen Fit Modes */
        .fit { object-fit: contain !important; }
        .stretch { object-fit: fill !important; }
        .crop { object-fit: cover !important; }

        /* HIDING THE SEEKBAR FOR LIVE STREAMS */
        .shaka-seek-bar-container {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="player-wrapper">
        <!-- Header with LIVE badge and Screen fit control -->
        <div class="top-bar">
            <div class="live-badge">🔴 LIVE</div>
            <div class="aspect-controls">
                <select id="aspectRatio" onchange="changeAspect(this.value)">
                    <option value="fit">Aspect: Normal</option>
                    <option value="stretch">Aspect: Stretch</option>
                    <option value="crop">Aspect: Zoom / Crop</option>
                </select>
            </div>
        </div>

        <!-- Video Player -->
        <div class="video-container" data-shaka-player-container>
            <video data-shaka-player id="video" class="fit" autoplay playsinline></video>
        </div>
    </div>

    <script>
        const manifestUri = 'https://a57live-pv-ta-amazon.akamaized.net/iad-nitro/live/clients/dash/enc/ldgnvordfu/out/v1/430b37000b9148379747ac5cfb2ada46/cenc.mpd';

        async function initPlayer() {
            const video = document.getElementById('video');
            const videoContainer = document.querySelector('[data-shaka-player-container]');
            
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, videoContainer, video);
            
            // Clean UI config - removed time and seekbar functions
            const config = {
                addSeekBar: false, 
                controlPanelElements: [
                    'play_pause',
                    'mute',
                    'volume',
                    'spacer',
                    'quality',
                    'fullscreen'
                ]
            };
            ui.configure(config);

            // Shaka Player Streaming Optimization for Live Sports
            player.configure({
                streaming: {
                    bufferingGoal: 10,
                    rebufferingGoal: 2,
                    lowLatencyMode: true // Helps the stream play smoother
                },
                drm: {
                    clearKeys: {
                        '3aa6f9df41c299f659aaee15d0067900': '0434703fb407fb12980f51944271a1f8'
                    }
                }
            });

            try {
                await player.load(manifestUri);
                // Muted is required for auto-play to work on most browsers initially
                video.muted = true;
                video.play();
            } catch (e) {
                console.error('Video load error:', e);
            }
        }

        // Screen Fit Function
        function changeAspect(mode) {
            const video = document.getElementById('video');
            video.className = mode; 
        }

        document.addEventListener('shaka-ui-loaded', initPlayer);
    </script>

</body>
</html>
