        triggerHaptic([30, 50]);

    const fitModes = ['contain', 'cover', 'fill'];

    let fitIdx = 0;
    function toggleFitMode() {
        triggerHaptic(40);
        fitIdx = (fitIdx + 1) % fitModes.length;

        document.querySelector("#fit-btn i").className = "fas " + fitIcons[fitIdx];

        triggerHaptic(40);

    function closeQualityMenu() { triggerHaptic(); document.getElementById('quality-overlay').classList.remove('active'); }

    function updateQualityUI() {
        const list = document.getElementById('quality-list');
        list.innerHTML = "";
        let autoBtn = document.createElement('div');
        autoBtn.className = 'q-item active'; autoBtn.innerText = 'Auto (Recommended)';
        autoBtn.onclick = () => setQuality('auto', autoBtn);
        list.appendChild(autoBtn);

        if (player) {
            const variantTracks = player.getVariantTracks();
            let uniqueHeights = [...new Set(variantTracks.map(t => t.height))].filter(Boolean).sort((a,b) => b - a);
            
            uniqueHeights.forEach(height => {
                let btn = document.createElement('div');
                btn.className = 'q-item'; btn.innerText = height + 'p';
                btn.onclick = () => setQuality(height, btn);
                list.appendChild(btn);
            });
        }
    }

    function setQuality(val, clickedBtn) {
        triggerHaptic();
        document.querySelectorAll('.q-item').forEach(b => b.classList.remove('active'));
        clickedBtn.classList.add('active');
        if (player) {
            if (val === 'auto') { player.configure({ abr: { enabled: true } }); } 
            else { player.configure({ abr: { enabled: false } }); const trackToSelect = player.getVariantTracks().find(t => t.height === val); if (trackToSelect) player.selectVariantTrack(trackToSelect, true); }
        }
        closeQualityMenu();
    }

    window.seekVideo = function(seconds) {
        triggerHaptic([30, 40]); 
        const vid = document.getElementById("video");
        if (vid) { vid.currentTime = vid.currentTime + seconds; }
    }

    /* Multi-Channel Player Initialization */
    async function initPlayer(id) {
        triggerHaptic(50);
        const config = CHANNELS[id];
        const video = document.getElementById("video"), container = document.getElementById("player-container"), loader = document.getElementById("loader");
        loader.style.display = "block";
        
        if (player) { await player.destroy(); player = null; }

        shaka.polyfill.installAll();
        player = new shaka.Player();
        await player.attach(video);
        
        if (!ui) ui = new shaka.ui.Overlay(player, container, video);
        ui.configure({ controlPanelElements: ["play_pause", "time_and_duration", "spacer", "mute", "fullscreen"] });
        
        player.configure({
            drm: { clearKeys: { [config.kid]: config.key } },
            streaming: { lowLatencyMode: false, bufferingGoal: 15 }
        });

        player.getNetworkingEngine().clearAllRequestFilters();
        player.getNetworkingEngine().registerRequestFilter((type, request) => {
            request.headers["Referer"] = "https://www.jiotv.com/";
            request.headers["User-Agent"] = "plaYtv/7.1.5";
        });

        try { 
            await player.load(config.url); 
            loader.style.display = "none"; 
            video.play(); video.muted = false; 
            updateQualityUI();
            requestWakeLock(); // Start Anti-Sleep
        } catch (e) { 
            console.error("Stream Load Error: ", e); 
            loader.style.display = "none";
        }
    }

    window.onload = () => {
        const grid = document.getElementById("ch-grid");
        const startId = "mks1";

        Object.keys(CHANNELS).forEach(key => {
            const card = document.createElement("div");
            card.className = `ch-card ${key === startId ? 'active' : ''}`;
            card.innerHTML = `<i class="${CHANNELS[key].icon}"></i><span>${CHANNELS[key].name}</span><div class="server-tag">${CHANNELS[key].tag}</div>`;
            card.onclick = () => {
                initPlayer(key);
                document.querySelectorAll('.ch-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
            };
            grid.appendChild(card);
        });
        initPlayer(startId);
    };
    </script>
</body>
