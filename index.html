<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKS Sports - Live Streaming</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <!-- Glowing Title -->
    <div class="live-title">
        🔴 Live Match
    </div>

    <!-- Video Grid -->
    <div class="video-grid">
        
        <!-- Player 1: Third Party Server -->
        <div class="player-box">
            <h3 class="server-title">Server 1 (Live Stream)</h3>
            <div class="player-container">
                <div class="mks-player-wrapper">
                    <iframe 
                        src="https://ex.roooom.online/?alba-player=home1&serv=0" 
                        allowfullscreen="true" 
                        frameborder="0" 
                        scrolling="no"
                        oncontextmenu="return false;">
                    </iframe>
                </div>
            </div>
        </div>

        <!-- Player 2: YouTube Server -->
        <div class="player-box">
            <h3 class="server-title">Server 2 (Backup Stream)</h3>
            <div class="player-container">
                <div class="mks-player-wrapper">
                    <iframe 
                        src="https://www.youtube.com/embed/XJoMu50BsxM" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen="true" 
                        frameborder="0" 
                        oncontextmenu="return false;">
                    </iframe>
                </div>
            </div>
        </div>

        <!-- 👇 NAYA SERVER ADD KARNE KE LIYE YAHAN PASTE KARO 👇 -->
        <!-- Future mein Server 3 ya 4 add karna ho toh is line ke theek niche paste karna -->
        
        

        <!-- 👆 NAYA SERVER YAHAN TAK AAYEGA 👆 -->

    </div>

    <script src="script.js"></script>
</body>
</html>
