<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Player</title>
    <!-- HLS.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* Premium Dark Theme for Streaming */
        body {
            background-color: #000000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .player-container {
            width: 100%;
            max-width: 800px;
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            overflow: hidden;
            background: #111;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <!-- Video Player Element -->
        <video id="live-video" controls autoplay muted></video>
    </div>

    <script>
        // Aapka pura Akamai Token wala M3U8 link
        var streamUrl = "https://sonydaimenew.akamaized.net/hls/live/2105079/cricodi1506/ENG/master.m3u8?hdnea=exp=1781538436~acl=/*~id=82345712319781574074851400866986~hmac=d48afe4724596d1f706baab6c69320a6df4b92e2cdc825a0353dc04097d0def6";
        
        var video = document.getElementById('live-video');

        // Check if browser supports HLS.js
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        }
        // Safari natively supports HLS, so we fallback to direct source
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    </script>

</body>
</html>
